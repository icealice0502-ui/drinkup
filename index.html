<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="喝水监督">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>DrinkUp · 喝水监督</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e;
  --accent:#00e5ff; --success:#00ff88; --warn:#ffaa00;
  --danger:#ff2244; --text:#e8e8f0; --muted:#5a5a7a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;overflow:hidden;user-select:none}

#video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);z-index:0;opacity:0;transition:opacity 0.8s}
#video.ready{opacity:1}

#overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;
  background:linear-gradient(to bottom,rgba(10,10,15,0.6) 0%,rgba(10,10,15,0.15) 35%,rgba(10,10,15,0.15) 65%,rgba(10,10,15,0.8) 100%);
  transition:background 0.5s}
#overlay.danger{background:linear-gradient(to bottom,rgba(80,0,10,0.75) 0%,rgba(60,0,8,0.35) 40%,rgba(60,0,8,0.35) 60%,rgba(80,0,10,0.9) 100%)}

#danger-border{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2;border:3px solid var(--danger);pointer-events:none;opacity:0;transition:opacity 0.3s}
#danger-border.show{opacity:1;animation:bflash 0.8s ease-in-out infinite alternate}
@keyframes bflash{from{opacity:0.3}to{opacity:1}}

#scanline{position:fixed;top:0;left:0;width:100%;height:2px;z-index:2;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;animation:scan 3s linear infinite}
#scanline.fast{background:linear-gradient(90deg,transparent,var(--danger),transparent);animation:scan 0.9s linear infinite}
@keyframes scan{0%{top:0%;opacity:0}5%{opacity:0.5}95%{opacity:0.5}100%{top:100%;opacity:0}}

#topbar{position:fixed;top:0;left:0;right:0;z-index:10;padding:max(env(safe-area-inset-top),16px) 20px 16px;display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;letter-spacing:0.2em;color:var(--accent);text-shadow:0 0 20px rgba(0,229,255,0.5);transition:all 0.3s}
.app-title.danger{color:var(--danger);text-shadow:0 0 20px rgba(255,34,68,0.8)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:all 0.3s}
.sdot.on{background:var(--success);box-shadow:0 0 12px var(--success);animation:pd 1.5s ease-in-out infinite}
.sdot.bad{background:var(--danger);box-shadow:0 0 12px var(--danger);animation:pd 0.5s ease-in-out infinite}
@keyframes pd{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

#cdown-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);z-index:5;text-align:center}
#cdown-num{font-family:'Space Mono',monospace;font-size:clamp(68px,21vw,108px);font-weight:700;line-height:1;color:var(--text);transition:color 0.4s,text-shadow 0.4s}
#cdown-num.warn{color:var(--warn);text-shadow:0 0 30px rgba(255,170,0,0.5)}
#cdown-num.danger{color:var(--danger);text-shadow:0 0 30px rgba(255,34,68,0.8);animation:nshake 0.4s ease-in-out infinite}
@keyframes nshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
#cdown-lbl{margin-top:8px;font-size:11px;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;font-family:'Space Mono',monospace;transition:color 0.3s}

#detect-frame{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);width:min(250px,65vw);height:min(250px,65vw);z-index:4;pointer-events:none}
.corner{position:absolute;width:24px;height:24px;border-color:var(--accent);border-style:solid;opacity:0.5;transition:all 0.3s}
.corner.tl{top:0;left:0;border-width:2px 0 0 2px}
.corner.tr{top:0;right:0;border-width:2px 2px 0 0}
.corner.bl{bottom:0;left:0;border-width:0 0 2px 2px}
.corner.br{bottom:0;right:0;border-width:0 2px 2px 0}
#detect-frame.drinking .corner{border-color:var(--success);opacity:1;animation:cg 0.4s ease-in-out infinite alternate}
#detect-frame.punishing .corner{border-color:var(--danger);opacity:1;animation:cd 0.5s ease-in-out infinite alternate}
@keyframes cg{from{box-shadow:0 0 6px var(--success)}to{box-shadow:0 0 18px var(--success)}}
@keyframes cd{from{box-shadow:0 0 6px var(--danger)}to{box-shadow:0 0 18px var(--danger)}}

#pring{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);width:min(272px,70vw);height:min(272px,70vw);z-index:3;pointer-events:none}
#rc{fill:none;stroke:var(--success);stroke-width:2.5;stroke-linecap:round;transform-origin:center;transform:rotate(-90deg);transition:stroke-dashoffset 0.1s linear;opacity:0}

#hint{position:fixed;top:50%;left:50%;z-index:5;transform:translate(-50%,calc(-60% + min(142px,34vw) + 18px));font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;white-space:nowrap;transition:color 0.3s;text-align:center}
#hint.drinking{color:var(--success)}
#hint.punishing{color:var(--danger);animation:tf 0.6s ease-in-out infinite alternate}
@keyframes tf{from{opacity:0.5}to{opacity:1}}

#pbanner{position:fixed;top:50%;left:0;right:0;z-index:15;transform:translateY(-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity 0.4s}
#pbanner.show{opacity:1}
.pbanner-main{font-family:'Space Mono',monospace;font-size:clamp(26px,9vw,50px);font-weight:700;color:var(--danger);text-shadow:0 0 40px rgba(255,34,68,0.9);animation:bp 0.6s ease-in-out infinite alternate}
@keyframes bp{from{transform:scale(0.97)}to{transform:scale(1.03)}}
.pbanner-sub{margin-top:10px;font-size:12px;letter-spacing:0.15em;color:rgba(255,34,68,0.7)}

#spanel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none;transition:background 0.3s}
#spanel.show{background:rgba(0,255,136,0.07);pointer-events:auto}
.sw{font-family:'Space Mono',monospace;font-size:clamp(44px,15vw,80px);font-weight:700;color:var(--success);letter-spacing:0.08em;text-shadow:0 0 40px rgba(0,255,136,0.9),0 0 80px rgba(0,255,136,0.4);opacity:0;transform:scale(0.6);transition:opacity 0.35s,transform 0.35s}
#spanel.show .sw{opacity:1;transform:scale(1)}
.semoji{font-size:clamp(34px,11vw,56px);margin-bottom:12px;opacity:0;transition:opacity 0.3s 0.1s}
#spanel.show .semoji{opacity:1}
.ssub{margin-top:10px;font-size:12px;color:rgba(0,255,136,0.6);letter-spacing:0.18em;opacity:0;transition:opacity 0.3s 0.2s}
#spanel.show .ssub{opacity:1}
.stap{margin-top:28px;font-size:11px;color:var(--muted);letter-spacing:0.15em;opacity:0;transition:opacity 0.3s 0.5s}
#spanel.show .stap{opacity:1}

#bottombar{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:20px 24px max(env(safe-area-inset-bottom),24px);display:flex;align-items:flex-end;justify-content:space-between}
.slabel{font-size:10px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;font-family:'Space Mono',monospace}
.sval{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--text);line-height:1;margin-top:4px}

#splash{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity 0.6s;padding:24px}
#splash.hide{opacity:0;pointer-events:none}
.slogo{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;color:var(--accent);text-shadow:0 0 30px rgba(0,229,255,0.6);letter-spacing:0.1em}
.sdesc{font-size:12px;color:var(--muted);letter-spacing:0.12em;text-align:center;line-height:1.8;max-width:260px}
.srules{margin-top:4px;padding:14px 18px;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--muted);line-height:2.2;max-width:290px;text-align:left}
.srules span{color:var(--text)}
#sbtn{margin-top:12px;padding:13px 44px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Space Mono',monospace;font-size:13px;letter-spacing:0.2em;border-radius:2px;cursor:pointer;transition:all 0.2s}
#sbtn:active{background:rgba(0,229,255,0.1);box-shadow:0 0 20px rgba(0,229,255,0.3)}

.coin{position:fixed;font-size:22px;pointer-events:none;z-index:35;animation:cf 1.2s ease-out forwards}
@keyframes cf{0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(0.3)}}
.ptcl{position:fixed;width:5px;height:5px;border-radius:50%;background:var(--success);pointer-events:none;z-index:35;animation:pf 0.9s ease-out forwards}
@keyframes pf{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
</style>
</head>
<body>

<div id="splash">
  <div class="slogo">💧 DRINKUP</div>
  <div class="sdesc">喝水监督助手</div>
  <div class="srules">
    ⏱ <span>5分钟</span>内必须喝水<br>
    ✅ 检测到喝水 → <span>爆金币庆祝！</span><br>
    ❌ 超时未喝水 → <span>手机持续震动</span><br>
    💡 震动中喝水 → <span>立即解除惩罚</span>
  </div>
  <button id="sbtn" onclick="startApp()">开始监督</button>
</div>

<video id="video" autoplay playsinline muted></video>
<div id="overlay"></div>
<div id="danger-border"></div>
<div id="scanline"></div>

<div id="topbar">
  <div class="app-title" id="atitle">DRINKUP</div>
  <div class="sdot" id="sdot"></div>
</div>

<div id="cdown-wrap">
  <div id="cdown-num">5:00</div>
  <div id="cdown-lbl">距离下次喝水</div>
</div>

<svg id="pring" viewBox="0 0 272 272">
  <circle id="rc" cx="136" cy="136" r="134"/>
</svg>
<div id="detect-frame">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
</div>
<div id="hint">举起杯子 · 做喝水动作</div>

<div id="pbanner">
  <div class="pbanner-main">⚠️ 快去喝水！</div>
  <div class="pbanner-sub">完成喝水动作即可解除震动</div>
</div>

<div id="spanel" onclick="dismissSuccess()">
  <div class="semoji" id="semoji">🎉</div>
  <div class="sw" id="sword">SUCCESS!</div>
  <div class="ssub" id="ssub">你太棒了！</div>
  <div class="stap">点击继续</div>
</div>

<div id="bottombar">
  <div>
    <div class="slabel">今日次数</div>
    <div class="sval" id="cval">0</div>
  </div>
  <div style="text-align:right">
    <div class="slabel">上次喝水</div>
    <div class="sval" style="font-size:15px;padding-top:8px" id="ltime">--:--</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
// ── 配置 ────────────────────────────────────────────────────
const CFG = {
  TOTAL_SEC       : 300,
  DRINK_HOLD_MS   : 500,
  SUCCESS_MS      : 4000,
  WARN_SEC        : 30,
  WRIST_RATIO     : 0.55,
  ELBOW_MAX       : 120,
  SC_START        : 'StartVibration',
  SC_STOP         : 'StopVibration',
};
const KP = {NOSE:0,LS:5,RS:6,LE:7,RE:8,LW:9,RW:10};

// ── 状态 ────────────────────────────────────────────────────
let detector=null, timeLeft=CFG.TOTAL_SEC;
let ticker=null, drinkStart=null;
let isExpired=false, isPunishing=false, isSuccess=false;
let todayCount=0;

// ── 工具 ────────────────────────────────────────────────────
const d2=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function ang3(a,b,c){
  const ba=[a.x-b.x,a.y-b.y],bc=[c.x-b.x,c.y-b.y];
  return Math.acos(Math.max(-1,Math.min(1,(ba[0]*bc[0]+ba[1]*bc[1])/(Math.hypot(...ba)*Math.hypot(...bc)+1e-6))))*180/Math.PI;
}
function fmt(s){const m=Math.floor(s/60),r=s%60;return m+':'+(r<10?'0':'')+r}

// ── 检测 ────────────────────────────────────────────────────
function checkWater(kps){
  const g=i=>kps[i], ok=i=>g(i)&&g(i).score>0.3;
  if(!ok(KP.NOSE)||!ok(KP.LS)||!ok(KP.RS)) return false;
  const nose=g(KP.NOSE),ls=g(KP.LS),rs=g(KP.RS),sw=d2(ls,rs)+1e-6;
  for(const[sh,el,wr]of[[ls,g(KP.LE),g(KP.LW)],[rs,g(KP.RE),g(KP.RW)]]){
    if(!el||!wr||el.score<0.3||wr.score<0.3) continue;
    if(d2(wr,nose)/sw<CFG.WRIST_RATIO && ang3(sh,el,wr)<CFG.ELBOW_MAX && wr.y<el.y) return true;
  }
  return false;
}

// ── 快捷指令 ────────────────────────────────────────────────
function runShortcut(name){
  // 通过iframe触发，避免页面跳转导致摄像头中断
  const f=document.createElement('iframe');
  f.style.display='none';
  f.src=`shortcuts://run-shortcut?name=${encodeURIComponent(name)}`;
  document.body.appendChild(f);
  setTimeout(()=>f.remove(), 2000);
}

function triggerPunishment(){
  isPunishing=true;
  runShortcut(CFG.SC_START);
  // 惩罚UI
  document.getElementById('overlay').classList.add('danger');
  document.getElementById('danger-border').classList.add('show');
  document.getElementById('scanline').classList.add('fast');
  document.getElementById('atitle').classList.add('danger');
  document.getElementById('sdot').className='sdot bad';
  document.getElementById('pbanner').classList.add('show');
  document.getElementById('detect-frame').classList.add('punishing');
  document.getElementById('hint').className='punishing';
  document.getElementById('hint').textContent='⚠ 喝水即可解除震动';
  document.getElementById('cdown-num').className='danger';
  document.getElementById('cdown-num').textContent='震动中';
  document.getElementById('cdown-lbl').textContent='快去喝水！';
  document.getElementById('cdown-lbl').style.color='var(--danger)';
}

function stopPunishment(){
  runShortcut(CFG.SC_STOP);
  isPunishing=false;
  document.getElementById('overlay').classList.remove('danger');
  document.getElementById('danger-border').classList.remove('show');
  document.getElementById('scanline').classList.remove('fast');
  document.getElementById('atitle').classList.remove('danger');
  document.getElementById('pbanner').classList.remove('show');
  document.getElementById('detect-frame').classList.remove('punishing');
}

// ── 金币爆炸 ────────────────────────────────────────────────
function boom(){
  const cx=innerWidth/2,cy=innerHeight/2;
  const emojis=['🪙','💰','✨','🌟','💫','🎊','🎉'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div');
    el.className='coin';
    el.textContent=emojis[i%emojis.length];
    const a=Math.random()*Math.PI*2,r=90+Math.random()*220;
    el.style.cssText=`left:${cx}px;top:${cy}px;--dx:${Math.cos(a)*r}px;--dy:${Math.sin(a)*r-80}px;--dr:${Math.random()*720-360}deg;animation-delay:${Math.random()*0.3}s;animation-duration:${0.8+Math.random()*0.6}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1600);
  }
  for(let i=0;i<16;i++){
    const p=document.createElement('div');
    p.className='ptcl';
    const a=Math.random()*Math.PI*2,r=70+Math.random()*160;
    p.style.cssText=`left:${cx}px;top:${cy}px;--dx:${Math.cos(a)*r}px;--dy:${Math.sin(a)*r}px;animation-delay:${Math.random()*0.2}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1100);
  }
}

// ── 成功处理 ────────────────────────────────────────────────
function onDrinkDetected(){
  const wasPunishing=isPunishing;
  if(wasPunishing) stopPunishment();

  todayCount++;
  isSuccess=true;
  drinkStart=null;
  updateRing(0);

  document.getElementById('cval').textContent=todayCount;
  const n=new Date();
  document.getElementById('ltime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');

  document.getElementById('semoji').textContent=wasPunishing?'🔓':'🎉';
  document.getElementById('sword').textContent=wasPunishing?'解除成功！':'SUCCESS!';
  document.getElementById('ssub').textContent=wasPunishing?'惩罚已解除，你终于喝水了！':['你太棒了！','继续保持！','健康第一！','喝水英雄！'][Math.floor(Math.random()*4)];
  document.getElementById('spanel').classList.add('show');
  boom();

  document.getElementById('detect-frame').className='';
  document.getElementById('hint').className='';
  document.getElementById('sdot').className='sdot';

  setTimeout(()=>{ if(isSuccess) dismissSuccess(); }, CFG.SUCCESS_MS);
}

function dismissSuccess(){
  if(!isSuccess) return;
  isSuccess=false;
  document.getElementById('spanel').classList.remove('show');
  // 重置倒计时
  timeLeft=CFG.TOTAL_SEC;
  isExpired=false;
  isPunishing=false;
  updateCountdown();
  startTicker();
}

// ── 倒计时 ────────────────────────────────────────────────
function updateCountdown(){
  if(isPunishing) return;
  const el=document.getElementById('cdown-num');
  const lb=document.getElementById('cdown-lbl');
  el.textContent=fmt(timeLeft);
  el.className='';
  if(timeLeft<=10){el.classList.add('danger')}
  else if(timeLeft<=CFG.WARN_SEC){el.classList.add('warn')}
  if(timeLeft<=CFG.WARN_SEC){
    lb.textContent='⚠ 快去喝水！';
    lb.style.color=timeLeft<=10?'var(--danger)':'var(--warn)';
  } else {
    lb.textContent='距离下次喝水';
    lb.style.color='';
  }
}

function startTicker(){
  clearInterval(ticker);
  ticker=setInterval(()=>{
    if(isSuccess) return;
    timeLeft--;
    updateCountdown();
    if(timeLeft<=0){
      clearInterval(ticker);
      isExpired=true;
      if(!isPunishing) triggerPunishment();
    }
  },1000);
}

// ── 进度环 ────────────────────────────────────────────────
function updateRing(p){
  const c=document.getElementById('rc'),r=134,ci=2*Math.PI*r;
  c.style.strokeDasharray=ci;
  c.style.strokeDashoffset=ci*(1-p);
  c.style.opacity=p>0?'0.9':'0';
}

// ── 检测循环（惩罚中持续运行）────────────────────────────────
async function detectLoop(video){
  async function loop(){
    if(isSuccess){requestAnimationFrame(loop);return}

    let drinking=false;
    try{
      const poses=await detector.estimatePoses(video);
      if(poses.length>0) drinking=checkWater(poses[0].keypoints);
    }catch(e){}

    const now=Date.now();

    // 更新UI（惩罚中只更新点点，不改识别框）
    if(!isPunishing){
      document.getElementById('sdot').className=drinking?'sdot on':'sdot';
      document.getElementById('detect-frame').classList.toggle('drinking',drinking);
      document.getElementById('hint').className=drinking?'drinking':'';
      document.getElementById('hint').textContent=drinking?'检测到喝水动作...':'举起杯子 · 做喝水动作';
    }

    if(drinking){
      if(!drinkStart) drinkStart=now;
      const prog=Math.min((now-drinkStart)/CFG.DRINK_HOLD_MS,1.0);
      updateRing(prog);
      if(prog>=1.0) onDrinkDetected();
    } else {
      drinkStart=null;
      if(!isPunishing) updateRing(0);
    }

    requestAnimationFrame(loop);
  }
  loop();
}

// ── 启动 ────────────────────────────────────────────────────
async function startApp(){
  const btn=document.getElementById('sbtn');
  btn.textContent='获取摄像头...'; btn.style.opacity='0.6';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    const video=document.getElementById('video');
    video.srcObject=stream;
    await new Promise(r=>video.onloadedmetadata=r);
    video.classList.add('ready');
    btn.textContent='加载AI模型...';
    detector=await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
    );
    document.getElementById('splash').classList.add('hide');
    startTicker();
    detectLoop(video);
  }catch(e){
    btn.textContent='请允许摄像头权限';
    btn.style.opacity='1';
    console.error(e);
  }
}
</script>
</body>
</html>
